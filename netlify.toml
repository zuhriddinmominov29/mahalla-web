# ═══════════════════════════════════════════════════════════
# mahallics.uz — Netlify Deploy Konfiguratsiyasi
# Yangi: React (Vite) app → mahalla-nazorat/frontend
# ═══════════════════════════════════════════════════════════

[build]
  base    = "mahalla-nazorat/frontend"
  command = "npm install && npm run build"
  publish = "mahalla-nazorat/frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# ─── SPA: barcha yo'llar → index.html ───────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Security Headers ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(self)"

# ─── Static assets uzoq cache ────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
